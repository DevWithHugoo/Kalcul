        explanation: "Attention, P ⇒ Q ne veut pas dire que Q ⇒ P (c'est la réciproque) ! Exemple : 'Si c'est un carré (P), alors il a 4 côtés (Q)' est vrai. Mais 'S'il a 4 côtés, c'est un carré' est faux (ça peut être un rectangle).",
        detail: "L'équivalence (P ⇔ Q) signifie que P implique Q ET Q implique P. 'Si et seulement si'. La contraposée de P ⇒ Q est (Non Q) ⇒ (Non P) et elle est toujours vraie si l'implication l'est !",
        example: "Contraposée du carré : Si ce n'est PAS une figure à 4 côtés (Non Q), alors ce n'est PAS un carré (Non P). Logique implacable.",
        questions: [
          { q: "Que signifie le symbole ⇒ en mathématiques ?", options: ["Équivalent à", "Implique (Si... alors...)", "Est égal à", "Différent de"], answer: 1, explanation: "C'est le symbole de l'implication logique." },
          { q: "Si la proposition 'Si A alors B' est vraie, que peut-on dire de 'Si B alors A' (sa réciproque) ?", options: ["Elle est forcément vraie", "Elle est forcément fausse", "Elle n'est pas nécessairement vraie", "Elle est équivalente"], answer: 2, explanation: "L'implication marche dans un sens. Si je suis à Paris, je suis en France. Mais si je suis en France, je ne suis pas forcément à Paris." },
          { q: "Qu'est-ce que la contraposée de 'P ⇒ Q' ?", options: ["Q ⇒ P", "(Non P) ⇒ (Non Q)", "P ⇔ Q", "(Non Q) ⇒ (Non P)"], answer: 3, explanation: "La contraposée inverse l'ordre et nie les deux propositions. Elle a toujours la même valeur de vérité que l'implication de départ." },
          { q: "Que signifie le symbole ⇔ ?", options: ["Approximativement", "Équivaut à (Si et seulement si)", "Plus grand que", "Contraposée"], answer: 1, explanation: "C'est l'équivalence. Les deux propositions impliquent l'autre mutuellement." },
          { q: "Un contre-exemple sert à :", options: ["Prouver qu'une implication est vraie", "Démontrer qu'une règle générale est FAUSSE", "Calculer une probabilité", "Remplacer un théorème"], answer: 1, explanation: "Il suffit d'un seul cas où la règle ne marche pas (un contre-exemple) pour prouver que la proposition est fausse." },
        ],
      },
    ];

    const COURSES = [
      { key: "calcul", label: "Calculer (Algèbre)", emoji: "🧮", color: "#2D6A4F", desc: "10 modules", modules: CALCUL_MODULES },
      { key: "analyse", label: "Analyser (Fonctions)", emoji: "📈", color: "#1B4FD8", desc: "10 modules", modules: ANALYSER_MODULES },
      { key: "decision", label: "Décider (Probas & Stats)", emoji: "🎯", color: "#C6923A", desc: "10 modules", modules: DECIDER_MODULES },
    ];

    const ACHIEVEMENTS = [
      { id: "first", label: "Premier quiz", emoji: "🌱", condition: (s) => (s.completedModules || []).length >= 1 },
      { id: "allcourses", label: "Tous les modules", emoji: "🎓", condition: (s) => (s.completedModules || []).length >= 30 },
      { id: "perfect", label: "Score parfait", emoji: "⭐", condition: (s) => s.perfectModules >= 1 },
      { id: "xp200", label: "200 XP atteints", emoji: "💎", condition: (s) => s.totalXP >= 200 },
      { id: "analyse", label: "Cap sur l'analyse", emoji: "📉", condition: (s) => (s.completedModules || []).some(m => m.startsWith("ana")) },
      { id: "fonda", label: "Calculs acquis", emoji: "⚡", condition: (s) => (s.completedModules || []).some(m => m.startsWith("cal")) },
      { id: "budget", label: "Maître des décisions", emoji: "⚖️", condition: (s) => (s.completedModules || []).some(m => m.startsWith("dec")) },
      { id: "all10", label: "10 modules complétés", emoji: "🏆", condition: (s) => (s.completedModules || []).length >= 10 },
    ];

    function Block({ label, color, children, C }) {
      return (
        <div style={{ background: C.surface, border: `1px solid ${C.border}`, borderRadius: 14, padding: "16px", marginBottom: 12 }}>
          <div style={{ fontSize: "0.65rem", fontWeight: 600, color, letterSpacing: 1, marginBottom: 8 }}>{label}</div>
          <p style={{ fontSize: "0.84rem", color: C.textSub, lineHeight: 1.7, margin: 0 }}>{children}</p>
        </div>
      );
    }

    function TopBar({ onBack, progress, total, lives, C }) {
      return (
        <div style={{ display: "flex", alignItems: "center", gap: 12, marginBottom: 28 }}>
          <button onClick={onBack} style={{ background: "none", border: "none", color: C.textMuted, fontSize: "1.1rem", cursor: "pointer", padding: "4px 8px 4px 0", fontFamily: "'DM Sans'" }}>←</button>
          <div style={{ flex: 1, height: 3, background: C.border, borderRadius: 999 }}>
            <div style={{ width: `${(progress / total) * 100}%`, height: "100%", background: C.accent, borderRadius: 999, transition: "width 0.4s ease" }} />
          </div>
          <div style={{ display: "flex", gap: 3 }}>
            {[...Array(3)].map((_, i) => (
              <span key={i} style={{ fontSize: "0.85rem", opacity: i < lives ? 1 : 0.2 }}>♥</span>
            ))}
          </div>
        </div>
      );
    }

    function BottomNav({ screen, setScreen, C }) {
      return (
        <div style={{ position: "fixed", bottom: 0, left: 0, right: 0, background: C.bg, borderTop: `1px solid ${C.border}`, display: "flex", justifyContent: "space-around", padding: "14px 0 22px" }}>
          {[["Accueil", "home", "○"], ["Cours", "courses", "◈"], ["Profil", "profile", "◇"]].map(([label, s, icon]) => (
            <div key={s} onClick={() => setScreen(s)} style={{ display: "flex", flexDirection: "column", alignItems: "center", gap: 5, cursor: "pointer", opacity: screen === s ? 1 : 0.3, transition: "opacity 0.2s" }}>
              <span style={{ fontSize: "1rem", color: screen === s ? C.accent : C.textMuted }}>{icon}</span>
              <span style={{ fontSize: "0.62rem", fontWeight: 600, color: screen === s ? C.accent : C.textMuted, letterSpacing: 0.5 }}>{label}</span>
            </div>
          ))}
        </div>

    function btnStyle(bg, C) {
      return { width: "100%", padding: "15px", borderRadius: 13, border: "none", background: bg, color: bg === "transparent" ? C.textSub : "#fff", fontWeight: 600, fontSize: "0.9rem", cursor: "pointer", fontFamily: "'DM Sans'" };
    }

    function Kalcul() {
      const [darkMode, setDarkMode] = useState(false);
      const C = darkMode ? DARK : LIGHT;

      const [screen, setScreen] = useState("home");
      const [courseKey, setCourseKey] = useState("calcul");
      const [moduleView, setModuleView] = useState(null);
      const [moduleMode, setModuleMode] = useState("sheet");

      const [modStep, setModStep] = useState(0);
      const [modSelected, setModSelected] = useState(null);
      const [modShowExp, setModShowExp] = useState(false);
      const [modLives, setModLives] = useState(3);
      const [modAnswers, setModAnswers] = useState([]);

      const [stats, setStats] = useState({
        totalXP: 0, perfectModules: 0, completedModules: [],
      });

      const [showSettings, setShowSettings] = useState(false);

      const resetProgress = () => {
        setStats({ totalXP: 0, perfectModules: 0, completedModules: [] });
        setShowSettings(false);
      };

      const moduleDone = (id) => (stats.completedModules || []).includes(id);

      const startModule = (mod, mode) => {
        setModuleView(mod);
        setModuleMode(mode);
        if (mode === "quiz") {
          setModStep(0); setModSelected(null); setModShowExp(false);
          setModLives(3); setModAnswers([]);
        }
        setScreen("module");
      };

      const handleModAnswer = (idx) => {
        if (modShowExp) return;
        setModSelected(idx); setModShowExp(true);
        const correct = idx === moduleView.questions[modStep].answer;
        setModAnswers(prev => [...prev, correct]);
        if (!correct) setModLives(l => Math.max(0, l - 1));
      };

      const nextMod = () => {
        const isLast = modStep + 1 >= moduleView.questions.length;
        if (isLast) {
          const total = modAnswers.filter(Boolean).length;
          const xp = Math.round((total / moduleView.questions.length) * 80);
          setStats(prev => ({
            ...prev,
            totalXP: prev.totalXP + xp,
            perfectModules: total === moduleView.questions.length ? prev.perfectModules + 1 : prev.perfectModules,
            completedModules: moduleDone(moduleView.id) ? prev.completedModules : [...(prev.completedModules || []), moduleView.id],
          }));
          setScreen("modresult");
        } else {
          setModStep(s => s + 1); setModSelected(null); setModShowExp(false);
        }
      };

      const modCorrectTotal = () => {
        return modAnswers.filter(Boolean).length;
      };

      const currentCourse = COURSES.find(c => c.key === courseKey);

      return (
        <div style={{ minHeight: "100vh", background: C.bg, color: C.text, fontFamily: "'DM Sans', 'Segoe UI', sans-serif" }}>

          {/* ── HOME ── */}
          {screen === "home" && (
            <div style={{ maxWidth: 440, margin: "0 auto", padding: "32px 20px 90px" }}>
              <div style={{ display: "flex", justifyContent: "space-between", alignItems: "flex-start", marginBottom: 40 }}>
                <div>
                  <div style={{ fontSize: "1.5rem", fontWeight: 700, letterSpacing: "-0.8px" }}>Kalcul</div>
                  <div style={{ fontSize: "0.72rem", color: C.textMuted, marginTop: 3 }}>Mathématiques, un concept à la fois</div>
                </div>
                <div style={{ display: "flex", gap: 10, alignItems: "center" }}>
                  <button onClick={() => setDarkMode(d => !d)} style={{ background: C.surface, border: `1px solid ${C.border}`, borderRadius: 10, padding: "8px 12px", cursor: "pointer", fontSize: "0.75rem", color: C.accent, fontWeight: 600, fontFamily: "'DM Sans'" }}>
                    {darkMode ? "☀️ Clair" : "🌙 Sombre"}
                  </button>
                  <div onClick={() => setScreen("profile")} className="card-hover" style={{ background: C.surface, border: `1px solid ${C.border}`, borderRadius: 12, padding: "10px 16px", textAlign: "right" }}>
                    <div style={{ fontSize: "0.6rem", color: C.textMuted, fontWeight: 500, letterSpacing: 0.5 }}>XP</div>
                    <div style={{ fontSize: "1rem", fontWeight: 700, color: C.gold, fontFamily: "'DM Mono'", marginTop: 1 }}>{stats.totalXP}</div>
                  </div>
                </div>
              </div>

              <div style={{ fontSize: "0.65rem", fontWeight: 600, color: C.textMuted, letterSpacing: 1.2, textTransform: "uppercase", marginBottom: 14 }}>Cours complets</div>
              <div style={{ display: "flex", flexDirection: "column", gap: 12, marginBottom: 32 }}>
                {COURSES.map((c, i) => {
                  const done = (stats.completedModules || []).filter(id => id.startsWith(c.modules[0].id.split("_")[0])).length;
                  return (
                    <div key={c.key} className="card-hover" onClick={() => { setCourseKey(c.key); setScreen("courses"); }} style={{ background: C.surface, border: `1px solid ${C.border}`, borderRadius: 18, padding: "20px", animation: `fadeUp ${0.2 + i * 0.08}s ease` }}>
                      <div style={{ display: "flex", alignItems: "center", gap: 14 }}>
                        <div style={{ width: 48, height: 48, borderRadius: 14, background: `${c.color}15`, display: "flex", alignItems: "center", justifyContent: "center", fontSize: "1.4rem", flexShrink: 0 }}>{c.emoji}</div>
                        <div style={{ flex: 1 }}>
                          <div style={{ fontWeight: 700, fontSize: "0.95rem", marginBottom: 4 }}>{c.label}</div>
                          <div style={{ fontSize: "0.7rem", color: C.textMuted, marginBottom: 8 }}>{c.desc} · {done}/10 complétés</div>
                          <div style={{ height: 3, background: C.border, borderRadius: 999 }}>
                            <div style={{ width: `${(done / 10) * 100}%`, height: "100%", background: c.color, borderRadius: 999, transition: "width 0.5s ease" }} />
                          </div>
                        </div>
                        <span style={{ fontSize: "0.9rem", color: C.textMuted }}>›</span>
                      </div>
                    </div>
                  );
                })}
              </div>

              <div style={{ fontSize: "0.65rem", fontWeight: 600, color: C.textMuted, letterSpacing: 1.2, textTransform: "uppercase", marginBottom: 14 }}>Leçons rapides</div>
              <div style={{ display: "flex", flexDirection: "column", gap: 10 }}>
                {COURSES.map((c, i) => {
                  const nextModule = c.modules.find(mod => !moduleDone(mod.id));
                  if (!nextModule) return null;
                  return (
                    <div key={nextModule.id} className="card-hover" onClick={() => startModule(nextModule, "sheet")} style={{ background: C.surface, border: `1px solid ${C.border}`, borderRadius: 16, padding: "18px 20px", animation: `fadeUp ${0.25 + i * 0.07}s ease` }}>
                      <div style={{ display: "flex", alignItems: "center", gap: 14 }}>
                        <div style={{ width: 42, height: 42, borderRadius: 11, background: `${c.color}15`, display: "flex", alignItems: "center", justifyContent: "center", fontSize: "1.2rem", flexShrink: 0 }}>{nextModule.emoji}</div>
                        <div style={{ flex: 1, minWidth: 0 }}>
                          <div style={{ display: "flex", alignItems: "center", gap: 8, marginBottom: 3 }}>
                            <span style={{ fontWeight: 600, fontSize: "0.9rem" }}>{nextModule.title}</span>
                            <span style={{ fontSize: "0.58rem", fontWeight: 600, color: c.color, background: `${c.color}18`, padding: "2px 7px", borderRadius: 999, letterSpacing: 0.5 }}>{nextModule.tag}</span>
                          </div>
                          <div style={{ fontSize: "0.73rem", color: C.textMuted, overflow: "hidden", textOverflow: "ellipsis", whiteSpace: "nowrap" }}>{nextModule.definition.slice(0, 60)}…</div>
                        </div>
                        <div style={{ flexShrink: 0, textAlign: "right" }}>
                          <div style={{ fontSize: "0.72rem", color: C.accent, fontWeight: 600, fontFamily: "'DM Mono'" }}>+80</div>
                          <div style={{ fontSize: "0.6rem", color: C.textMuted, marginTop: 1 }}>XP</div>
                        </div>
                      </div>
                    </div>
                  );
                })}
              </div>
              <BottomNav screen={screen} setScreen={setScreen} C={C} />
            </div>
          )}

          {/* ── COURSES LIST ── */}
          {screen === "courses" && (
            <div style={{ maxWidth: 440, margin: "0 auto", padding: "28px 20px 90px" }}>
              <div style={{ display: "flex", alignItems: "center", gap: 12, marginBottom: 24 }}>
                <button onClick={() => setScreen("home")} style={{ background: "none", border: "none", color: C.textMuted, fontSize: "1.1rem", cursor: "pointer", fontFamily: "'DM Sans'" }}>←</button>
                <div>
                  <div style={{ fontWeight: 700, fontSize: "1.05rem" }}>{currentCourse?.emoji} {currentCourse?.label}</div>
                  <div style={{ fontSize: "0.7rem", color: C.textMuted, marginTop: 2 }}>10 modules · Fiches + QCM 5 questions</div>
                </div>
              </div>

              <div style={{ display: "flex", gap: 8, marginBottom: 20, overflowX: "auto", paddingBottom: 4 }}>
                {COURSES.map(c => (
                  <button key={c.key} onClick={() => setCourseKey(c.key)} style={{ padding: "7px 14px", borderRadius: 999, border: `1px solid ${courseKey === c.key ? c.color : C.border}`, background: courseKey === c.key ? `${c.color}15` : "transparent", color: courseKey === c.key ? c.color : C.textMuted, fontSize: "0.73rem", fontWeight: 600, cursor: "pointer", fontFamily: "'DM Sans'", whiteSpace: "nowrap" }}>{c.emoji} {c.label}</button>
                ))}
              </div>

              <div style={{ display: "flex", flexDirection: "column", gap: 10 }}>
                {currentCourse?.modules.map((mod, i) => {
                  const isDone = moduleDone(mod.id);
                  return (
                    <div key={mod.id} style={{ background: C.surface, border: `1px solid ${C.border}`, borderRadius: 16, padding: "16px 18px", animation: `fadeUp ${0.1 + i * 0.04}s ease` }}>
                      <div style={{ display: "flex", alignItems: "center", gap: 12, marginBottom: 12 }}>
                        <div style={{ width: 38, height: 38, borderRadius: 10, background: C.accentDim, display: "flex", alignItems: "center", justifyContent: "center", fontSize: "1.1rem", flexShrink: 0 }}>{mod.emoji}</div>

                          <div style={{ display: "flex", alignItems: "center", gap: 7 }}>
                            <span style={{ fontWeight: 600, fontSize: "0.87rem" }}>{mod.title}</span>
                            {isDone && <span style={{ fontSize: "0.55rem", fontWeight: 600, color: C.success, background: C.successDim, padding: "2px 6px", borderRadius: 999 }}>FAIT</span>}
                          </div>
                          <div style={{ fontSize: "0.68rem", color: C.textMuted, marginTop: 2, lineHeight: 1.4 }}>{mod.definition.slice(0, 65)}…</div>
                        </div>
                      </div>
                      <div style={{ display: "flex", gap: 8 }}>
                        <button onClick={() => startModule(mod, "sheet")} style={{ flex: 1, padding: "9px", borderRadius: 10, border: `1px solid ${C.border}`, background: "transparent", color: C.textSub, fontWeight: 600, fontSize: "0.75rem", cursor: "pointer", fontFamily: "'DM Sans'" }}>📖 Fiche cours</button>
                        <button onClick={() => startModule(mod, "quiz")} style={{ flex: 1, padding: "9px", borderRadius: 10, border: "none", background: C.accent, color: "#fff", fontWeight: 600, fontSize: "0.75rem", cursor: "pointer", fontFamily: "'DM Sans'" }}>✏️ QCM</button>
                      </div>
                    </div>
                  );
                })}
              </div>
              <div style={{ marginTop: 24, marginBottom: 8, textAlign: "center" }}>
                <span style={{ fontSize: "0.62rem", color: C.textMuted, fontWeight: 400, letterSpacing: 0.3 }}>
                  ✦ Contenu des cours généré par IA
                </span>
              </div>
              <BottomNav screen={screen} setScreen={setScreen} C={C} />
            </div>
          )}

          {/* ── MODULE SHEET ── */}
          {screen === "module" && moduleView && moduleMode === "sheet" && (
            <div style={{ maxWidth: 440, margin: "0 auto", padding: "28px 20px 40px", animation: "fadeUp 0.3s ease" }}>
              <div style={{ display: "flex", alignItems: "center", gap: 10, marginBottom: 24 }}>
                <button onClick={() => setScreen("courses")} style={{ background: "none", border: "none", color: C.textMuted, fontSize: "1.1rem", cursor: "pointer", fontFamily: "'DM Sans'" }}>←</button>
                <span style={{ fontSize: "0.63rem", fontWeight: 600, color: C.accent, letterSpacing: 1 }}>{moduleView.tag}</span>
              </div>
              <div style={{ fontSize: "2rem", marginBottom: 10 }}>{moduleView.emoji}</div>
              <div style={{ fontSize: "1.4rem", fontWeight: 700, letterSpacing: "-0.3px", marginBottom: 20 }}>{moduleView.title}</div>

              <div style={{ background: C.accentDim, border: `1px solid ${C.accentBorder}`, borderRadius: 14, padding: "14px 16px", marginBottom: 14 }}>
                <div style={{ fontSize: "0.63rem", fontWeight: 600, color: C.accent, letterSpacing: 1, marginBottom: 6 }}>DÉFINITION</div>
                <p style={{ fontSize: "0.85rem", color: C.text, lineHeight: 1.65, margin: 0, fontWeight: 500 }}>{moduleView.definition}</p>
              </div>

              <Block label="EXPLICATION SIMPLE" color={C.textMuted} C={C}>{moduleView.explanation}</Block>
              <Block label="POUR ALLER PLUS LOIN" color={C.accent} C={C}>{moduleView.detail}</Block>

              <div style={{ background: C.goldDim, border: `1px solid rgba(198,146,58,0.2)`, borderRadius: 14, padding: "14px 16px", marginBottom: 28 }}>
                <div style={{ fontSize: "0.63rem", fontWeight: 600, color: C.gold, letterSpacing: 1, marginBottom: 6 }}>EXEMPLE CONCRET</div>
                <p style={{ fontSize: "0.82rem", color: C.textSub, lineHeight: 1.65, margin: 0 }}>{moduleView.example}</p>
              </div>

              <button onClick={() => startModule(moduleView, "quiz")} style={btnStyle(C.accent, C)}>Tester ses connaissances (QCM)</button>
            </div>
          )}

          {/* ── MODULE QUIZ ── */}
          {screen === "module" && moduleView && moduleMode === "quiz" && (
            <div style={{ maxWidth: 440, margin: "0 auto", padding: "28px 20px 40px" }}>
              <TopBar onBack={() => setScreen("courses")} progress={modStep} total={moduleView.questions.length} lives={modLives} C={C} />
              <div key={modStep} style={{ animation: "fadeUp 0.3s ease" }}>
                <div style={{ fontSize: "0.63rem", fontWeight: 600, color: C.accent, letterSpacing: 1, marginBottom: 4 }}>{moduleView.title}</div>
                <div style={{ fontSize: "0.63rem", fontWeight: 600, color: C.textMuted, letterSpacing: 1, marginBottom: 16 }}>QUESTION {modStep + 1} / {moduleView.questions.length}</div>
                <div style={{ fontSize: "1rem", fontWeight: 600, lineHeight: 1.55, marginBottom: 26 }}>{moduleView.questions[modStep].q}</div>
                <div style={{ display: "flex", flexDirection: "column", gap: 9, marginBottom: 22 }}>
                  {moduleView.questions[modStep].options.map((opt, idx) => {
                    const isCorrect = idx === moduleView.questions[modStep].answer;
                    const isSelected = idx === modSelected;
                    let bg = C.surface, border = C.border, textColor = C.text;
                    if (modShowExp && isCorrect) { bg = C.successDim; border = C.success; textColor = C.success; }
                    if (modShowExp && isSelected && !isCorrect) { bg = C.errorDim; border = C.error; textColor = C.error; }
                    return (
                      <button key={idx} onClick={() => handleModAnswer(idx)} style={{ background: bg, border: `1px solid ${border}`, borderRadius: 12, padding: "14px 15px", color: textColor, fontWeight: 500, fontSize: "0.85rem", cursor: modShowExp ? "default" : "pointer", textAlign: "left", display: "flex", alignItems: "center", gap: 12, fontFamily: "'DM Sans'", transition: "all 0.15s" }}>
                        <span style={{ width: 22, height: 22, borderRadius: 6, flexShrink: 0, background: modShowExp && isCorrect ? "rgba(64,145,108,0.2)" : modShowExp && isSelected && !isCorrect ? "rgba(193,68,14,0.2)" : C.accentDim, color: modShowExp && isCorrect ? C.success : modShowExp && isSelected && !isCorrect ? C.error : C.accent, display: "flex", alignItems: "center", justifyContent: "center", fontSize: "0.67rem", fontWeight: 700 }}>{String.fromCharCode(65 + idx)}</span>
                        {opt}
                      </button>
                    );
                  })}
                </div>
                {modShowExp && (
                  <div style={{ background: C.surface, border: `1px solid ${C.border}`, borderRadius: 12, padding: "13px 15px", marginBottom: 18, animation: "fadeIn 0.25s ease" }}>
                    <div style={{ fontSize: "0.63rem", fontWeight: 600, color: C.textMuted, letterSpacing: 1, marginBottom: 6 }}>EXPLICATION</div>
                    <p style={{ fontSize: "0.81rem", color: C.textSub, lineHeight: 1.65, margin: 0 }}>{moduleView.questions[modStep].explanation}</p>
                  </div>
                )}
                {modShowExp && (
                  <button onClick={nextMod} style={{ ...btnStyle(C.accent, C), animation: "fadeUp 0.2s ease" }}>
                    {modStep + 1 >= moduleView.questions.length ? "Voir les résultats" : "Continuer"}
                  </button>
                )}
              </div>
            </div>
          )}

          {/* ── MODULE RESULT ── */}
          {screen === "modresult" && moduleView && (
            <div style={{ maxWidth: 440, margin: "0 auto", padding: "52px 20px 40px", textAlign: "center", animation: "scaleIn 0.35s ease" }}>
              <div style={{ fontSize: "2.8rem", marginBottom: 18 }}>
                {modCorrectTotal() >= moduleView.questions.length ? "🏆" : modCorrectTotal() >= 3 ? "⭐" : "💪"}
              </div>
              <div style={{ fontSize: "1.35rem", fontWeight: 700, marginBottom: 5 }}>
                {modCorrectTotal() >= moduleView.questions.length ? "Parfait !" : modCorrectTotal() >= 3 ? "Bien joué !" : "Continue d'apprendre"}
              </div>
              <div style={{ fontSize: "0.78rem", color: C.textMuted, marginBottom: 34 }}>{modCorrectTotal()}/{moduleView.questions.length} bonnes réponses</div>
              <div style={{ background: C.surface, border: `1px solid ${C.border}`, borderRadius: 18, padding: "22px", marginBottom: 16 }}>
                <div style={{ fontSize: "0.63rem", fontWeight: 600, color: C.textMuted, letterSpacing: 1, marginBottom: 10 }}>XP GAGNÉ</div>
                <div style={{ fontSize: "2.6rem", fontWeight: 700, color: C.gold, fontFamily: "'DM Mono'" }}>+{Math.round((modCorrectTotal() / moduleView.questions.length) * 80)}</div>
                <div style={{ fontSize: "0.7rem", color: C.textMuted, marginTop: 7 }}>Total : {stats.totalXP} XP</div>
              </div>
              <div style={{ display: "flex", gap: 10, marginBottom: 24 }}>
                {[{ label: "Score", value: `${modCorrectTotal()}/${moduleView.questions.length}` }, { label: "Vies", value: `${modLives}/3` }].map(s => (
                  <div key={s.label} style={{ flex: 1, background: C.surface, border: `1px solid ${C.border}`, borderRadius: 13, padding: "13px" }}>
                    <div style={{ fontSize: "1.1rem", fontWeight: 700 }}>{s.value}</div>
                    <div style={{ fontSize: "0.65rem", color: C.textMuted, marginTop: 4 }}>{s.label}</div>
                  </div>
                ))}
              </div>
              <button onClick={() => startModule(moduleView, "sheet")} style={{ ...btnStyle("transparent", C), border: `1px solid ${C.border}`, marginBottom: 10 }}>Revoir la fiche</button>
              <button onClick={() => setScreen("courses")} style={btnStyle(C.accent, C)}>Retour aux cours</button>
            </div>
          )}

          {/* ── PROFILE ── */}
          {screen === "profile" && (
            <div style={{ maxWidth: 440, margin: "0 auto", padding: "32px 20px 90px" }}>
              <div style={{ display: "flex", alignItems: "center", justifyContent: "space-between", marginBottom: 26 }}>
                <div style={{ fontWeight: 700, fontSize: "1.1rem" }}>Profil</div>
                <button onClick={() => setShowSettings(true)} style={{
                  background: C.surface, border: `1px solid ${C.border}`,
                  borderRadius: 10, padding: "7px 13px", cursor: "pointer",
                  fontSize: "0.75rem", color: C.textSub, fontWeight: 600,
                  fontFamily: "'DM Sans'", display: "flex", alignItems: "center", gap: 6,
                }}>⚙️ Paramètres</button>
              </div>

              {showSettings && (
                <div style={{ position: "fixed", inset: 0, background: "rgba(0,0,0,0.55)", zIndex: 100, display: "flex", alignItems: "flex-end", justifyContent: "center", animation: "fadeIn 0.2s ease" }}>
                  <div style={{ background: C.surface, borderRadius: "22px 22px 0 0", padding: "28px 24px 40px", width: "100%", maxWidth: 440, border: `1px solid ${C.border}`, animation: "fadeUp 0.25s ease" }}>
                    <div style={{ display: "flex", alignItems: "center", justifyContent: "space-between", marginBottom: 22 }}>
                      <div style={{ fontWeight: 700, fontSize: "1rem" }}>⚙️ Paramètres</div>
                      <button onClick={() => setShowSettings(false)} style={{ background: "none", border: "none", color: C.textMuted, fontSize: "1.2rem", cursor: "pointer", fontFamily: "'DM Sans'" }}>✕</button>
                    </div>
                    <div style={{ background: C.bg, border: `1px solid ${C.border}`, borderRadius: 14, padding: "16px 18px", marginBottom: 14 }}>
                      <div style={{ fontWeight: 600, fontSize: "0.85rem", marginBottom: 4 }}>Réinitialiser la progression</div>
                      <div style={{ fontSize: "0.73rem", color: C.textMuted, marginBottom: 14 }}>Remet à zéro tous les XP et modules complétés. Cette action est irréversible.</div>
                      <button onClick={resetProgress} style={{
                        width: "100%", padding: "11px", borderRadius: 10,
                        background: C.errorDim, border: `1px solid ${C.error}`,
                        color: C.error, fontWeight: 700, fontSize: "0.82rem",
                        cursor: "pointer", fontFamily: "'DM Sans'",
                      }}>🗑️ Réinitialiser toute la progression</button>
                    </div>
                  </div>
                </div>
              )}

              <div style={{ background: C.surface, border: `1px solid ${C.border}`, borderRadius: 18, padding: "22px", marginBottom: 22 }}>
                <div style={{ fontSize: "0.63rem", fontWeight: 600, color: C.textMuted, letterSpacing: 1, marginBottom: 14 }}>STATISTIQUES</div>
                <div style={{ display: "flex" }}>
                  {[
                    { label: "XP total", value: stats.totalXP, mono: true, color: C.gold },
                    { label: "Modules", value: (stats.completedModules || []).length },
                    { label: "Parfaits", value: stats.perfectModules },
                  ].map((s, i) => (
                    <div key={s.label} style={{ flex: 1, textAlign: "center", borderLeft: i > 0 ? `1px solid ${C.border}` : "none", padding: "0 6px" }}>
                      <div style={{ fontSize: "1.1rem", fontWeight: 700, color: s.color || C.text, fontFamily: s.mono ? "'DM Mono'" : "inherit" }}>{s.value}</div>
                      <div style={{ fontSize: "0.6rem", color: C.textMuted, marginTop: 4 }}>{s.label}</div>
                    </div>
                  ))}
                </div>
              </div>

              <div style={{ fontSize: "0.65rem", fontWeight: 600, color: C.textMuted, letterSpacing: 1.2, textTransform: "uppercase", marginBottom: 12 }}>Succès</div>
              <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: 10, marginBottom: 22 }}>
                {ACHIEVEMENTS.map(a => {
                  const unlocked = a.condition(stats);
                  return (
                    <div key={a.id} style={{ background: C.surface, border: `1px solid ${unlocked ? C.borderLight : C.border}`, borderRadius: 13, padding: "15px", opacity: unlocked ? 1 : 0.35 }}>
                      <div style={{ fontSize: "1.4rem", marginBottom: 8, filter: unlocked ? "none" : "grayscale(1)" }}>{a.emoji}</div>
                      <div style={{ fontWeight: 600, fontSize: "0.78rem" }}>{a.label}</div>
                      {unlocked && <div style={{ fontSize: "0.63rem", color: C.success, marginTop: 4, fontWeight: 600 }}>Débloqué</div>}
                    </div>
                  );
                })}
              </div>

              {COURSES.map(course => (
                <div key={course.key}>
                  <div style={{ fontSize: "0.65rem", fontWeight: 600, color: C.textMuted, letterSpacing: 1.2, textTransform: "uppercase", marginBottom: 10, marginTop: 16 }}>{course.emoji} {course.label}</div>
                  {course.modules.map(mod => (
                    <div key={mod.id} style={{ background: C.surface, border: `1px solid ${C.border}`, borderRadius: 13, padding: "12px 15px", marginBottom: 7, display: "flex", alignItems: "center", gap: 12 }}>
                      <span style={{ fontSize: "1rem" }}>{mod.emoji}</span>
                      <div style={{ flex: 1 }}>
                        <div style={{ fontWeight: 500, fontSize: "0.78rem", marginBottom: 5 }}>{mod.title}</div>
                        <div style={{ height: 3, background: C.border, borderRadius: 999 }}>
                          <div style={{ width: moduleDone(mod.id) ? "100%" : "0%", height: "100%", background: C.accent, borderRadius: 999, transition: "width 0.5s ease" }} />
                        </div>
                      </div>
                      <span style={{ fontSize: "0.75rem", color: moduleDone(mod.id) ? C.success : C.textMuted }}>{moduleDone(mod.id) ? "✓" : "○"}</span>
                    </div>
                  ))}
                </div>
              ))}
              <BottomNav screen={screen} setScreen={setScreen} C={C} />
            </div>
          )}
        </div>
      );
    }

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<Kalcul />);
  </script>
</body>
</html>
